#

version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://todo:password@postgres:5432/todo
    depends_on:
      - postgres
    ports:
      - "5000:5000"
  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
volumes:
  postgres_data:
